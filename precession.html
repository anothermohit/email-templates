<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Earth–Sun–Moon 3D</title>

<!-- ✅ iPhone fullscreen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Orbits">
<link rel="apple-touch-icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA..."> <!-- optional -->

<!-- ✅ Theme -->
<meta name="theme-color" content="#000000">

<!-- ✅ Manifest (inline via JS will attach) -->

<style>
html,body { margin:0; height:100%; background:#000; overflow:hidden; }
canvas { position:fixed; width:100%; height:100%; }
</style>
</head>

<body>
<canvas id="c"></canvas>

<!-- THREE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/* =========================
   🔥 PWA SETUP (INLINE)
========================= */

// Create manifest dynamically
const manifest = {
  name: "Earth Sun Moon 3D",
  short_name: "Orbits",
  start_url: ".",
  display: "standalone",
  background_color: "#000000",
  theme_color: "#000000",
  icons: []
};

const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
const manifestURL = URL.createObjectURL(blob);

const link = document.createElement('link');
link.rel = 'manifest';
link.href = manifestURL;
document.head.appendChild(link);

// Register service worker (inline)
if ('serviceWorker' in navigator) {
  const swBlob = new Blob([`
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('fetch', e => {});
  `], {type:'application/javascript'});

  const swURL = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL);
}

/* =========================
   🌍 YOUR ORIGINAL APP
========================= */

// Minimal demo (replace with your full code if needed)
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 5;

const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1,32,32),
  new THREE.MeshBasicMaterial({color:0x3366ff})
);
scene.add(earth);

function animate(){
  requestAnimationFrame(animate);
  earth.rotation.y += 0.01;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', ()=>{
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
