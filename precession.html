<script>
'use strict';
// ═══════════════════════════════════════════════════════════════════════════
// PRECISE CONSTANTS  (IAU 2012 / IAU 2006 / VSOP87 / ELP 2000-82)
// ═══════════════════════════════════════════════════════════════════════════
var TWO_PI = Math.PI * 2;
var DEG    = Math.PI / 180;
var AS2R   = DEG / 3600;          // arcseconds → radians

// ── Earth orbital elements at J2000.0 (VSOP87 mean elements) ─────────────
var EARTH = {
  a:    1.000001018,               // AU semi-major axis
  e0:   0.016708634,               // eccentricity J2000
  eDot: -0.000042037,              // de/dy (per year, secular term)
  // longitude of perihelion from VE, J2000
  varpi0: 102.93735 * DEG,
  varpiDot: 1.71946e-4 * DEG,     // rad/yr (apsidal precession)
  // tropical year in days (IAU)
  Ty:   365.24218967,
  // sidereal year
  Tsid: 365.25636,
  R_eq: 6378.137,                  // km equatorial radius
  R_pol:6356.752,                  // km polar radius
};

// ── Sun physical ──────────────────────────────────────────────────────────
var SUN_RADIUS_KM = 695700.0;      // IAU 2015

// ── IAU 2006 General Precession (Lieske/Capitaine P03) ───────────────────
// ψ_A = p0·T + p1·T² + ... (arcsec, T in Julian centuries from J2000)
var PREC = {
  p0:  5029.097,                   // arcsec/cy — general precession in longitude
  p1:  1.5573,                     // arcsec/cy²
  p2:  0.00018,                    // arcsec/cy³ (negligible but included)
  eps0: 84381.406,                 // arcsec, obliquity at J2000 = 23°26'21.406"
  epsD: -46.836769,                // arcsec/cy
  epsD2: -0.00018,                 // arcsec/cy²
  period: 25771.6,                 // years (Platonic year)
};

// ── Moon orbital elements J2000.0 (ELP 2000-82 / Chapront) ───────────────
var MOON = {
  a:    384400.0,                  // km mean semi-major axis
  e0:   0.0549,                    // mean eccentricity
  i:    5.145 * DEG,               // inclination to ecliptic (rad)
  // Sidereal mean motion n (rad/day)
  n:    TWO_PI / 27.321661,
  // Periods (days)
  Tsid: 27.321661,                 // sidereal
  Tsyn: 29.530589,                 // synodic
  Tdra: 27.212221,                 // draconic (nodal)
  Tano: 27.554551,                 // anomalistic
  // Secular rates (rad/day, from ELP 2000-82)
  // Ascending node Ω precesses retrograde:
  nodeDot: -(TWO_PI / (18.6129 * 365.25)),   // rad/day, retrograde
  // Argument of perigee ω precesses prograde:
  apseDot:  (TWO_PI / (8.8505 * 365.25)),    // rad/day, prograde
  // J2000 epoch values (Chapront et al. 2002):
  Omega0:   125.0445479 * DEG,     // ascending node longitude at J2000
  omega0:   318.3082163 * DEG,     // argument of perigee at J2000
  M0:       134.9633964 * DEG,     // mean anomaly at J2000
  L0:       218.3165715 * DEG,     // mean longitude at J2000
  R_mean:   1737.4,                // km mean radius
};

// ─── Derived: distance ratios for display ────────────────────────────────
var AU_KM = 149597870.7;           // IAU 2012 definition

// ═══════════════════════════════════════════════════════════════════════════
// SCENE SCALE
// All orbital distances scaled logarithmically for visibility.
// Earth orbit: 6 scene units = 1 AU
// Moon orbit: 2.2 scene units (actual ratio 384400/149597870 ≈ 0.00257 AU — too small)
// ═══════════════════════════════════════════════════════════════════════════
var AU_SC   = 6.0;                 // scene units per AU
var MOON_SC = 2.2;                 // scene units for Moon orbit radius (exaggerated for visibility)
var SUN_R   = 0.55;                // scene radius of Sun
var EARTH_R = 0.22;                // scene radius of Earth
var MOON_R  = 0.10;                // scene radius of Moon (actual/Earth ≈ 0.272 — preserved here)
var PREC_R  = 7.0;                 // scene radius of precession trace sphere

// ═══════════════════════════════════════════════════════════════════════════
// KEPLER SOLVER
// ═══════════════════════════════════════════════════════════════════════════
function solveKepler(M, e) {
  M = ((M % TWO_PI) + TWO_PI) % TWO_PI;
  var E = M + e * Math.sin(M) * (1 + e * Math.cos(M)); // first approx
  for (var i = 0; i < 15; i++) {
    var dE = (M - E + e * Math.sin(E)) / (1 - e * Math.cos(E));
    E += dE;
    if (Math.abs(dE) < 1e-12) break;
  }
  return E;
}
function trueAnom(M, e) {
  var E = solveKepler(M, e);
  return 2 * Math.atan2(Math.sqrt(1+e)*Math.sin(E/2), Math.sqrt(1-e)*Math.cos(E/2));
}

// ═══════════════════════════════════════════════════════════════════════════
// PRECESSION
// ═══════════════════════════════════════════════════════════════════════════
function getPsiRad(Tyr) {         // general precession in longitude (rad)
  var T = Tyr / 100.0;
  return (PREC.p0*T + PREC.p1*T*T + PREC.p2*T*T*T) * AS2R;
}
function getEpsRad(Tyr) {         // obliquity of ecliptic (rad)
  var T = Tyr / 100.0;
  return (PREC.eps0 + PREC.epsD*T + PREC.epsD2*T*T) * AS2R;
}

// ═══════════════════════════════════════════════════════════════════════════
// POLE STARS (closest approach epoch, IAU catalogue RA/Dec J2000)
// ═══════════════════════════════════════════════════════════════════════════
var POLE_STARS = [
  { name:'Polaris (α UMi)',  yr:2100,    dec:89.264 },
  { name:'Thuban (α Dra)',   yr:-2830,   dec:64.38  },
  { name:'Kochab (β UMi)',   yr:-1100,   dec:74.16  },
  { name:'Alrai (γ Cep)',    yr:4200,    dec:77.63  },
  { name:'Iota Her',         yr:7400,    dec:46.01  },
  { name:'Deneb (α Cyg)',    yr:9830,    dec:45.28  },
  { name:'Vega (α Lyr)',     yr:13727,   dec:38.78  },
];
function nearestStar(eyr) {
  var yr = 2000+eyr, best=POLE_STARS[0], bd=1e12;
  for (var i=0;i<POLE_STARS.length;i++) {
    var d=Math.abs(POLE_STARS[i].yr-yr); if(d<bd){bd=d;best=POLE_STARS[i];}
  }
  return best.name;
}

// ═══════════════════════════════════════════════════════════════════════════
// MOON PHASE NAME
// ═══════════════════════════════════════════════════════════════════════════
function moonPhase(elongDeg) {
  var d = ((elongDeg % 360) + 360) % 360;
  if (d < 11.25 || d >= 348.75) return 'New Moon';
  if (d < 56.25)  return 'Waxing Crescent';
  if (d < 101.25) return 'First Quarter';
  if (d < 146.25) return 'Waxing Gibbous';
  if (d < 191.25) return 'Full Moon';
  if (d < 236.25) return 'Waning Gibbous';
  if (d < 281.25) return 'Last Quarter';
  return 'Waning Crescent';
}

// ═══════════════════════════════════════════════════════════════════════════
// SEASON
// ═══════════════════════════════════════════════════════════════════════════
function getSeason(d) {
  d = ((d%360)+360)%360;
  if (d<8||d>=352)  return 'Vernal Equinox — Sun at 0h RA, crosses equator northward (λ☉=0°)';
  if (d<82)         return 'Northern Spring (λ☉ = 0°→90°)';
  if (d<98)         return 'Summer Solstice — Sun at max northern declination +ε (λ☉=90°)';
  if (d<172)        return 'Northern Summer (λ☉ = 90°→180°)';
  if (d<188)        return 'Autumnal Equinox — Sun crosses equator southward (λ☉=180°)';
  if (d<262)        return 'Northern Autumn (λ☉ = 180°→270°)';
  if (d<278)        return 'Winter Solstice — Sun at max southern declination −ε (λ☉=270°)';
  return 'Northern Winter (λ☉ = 270°→360°)';
}

var _up  = new THREE.Vector3(0,1,0);
var _q1  = new THREE.Quaternion();
var _q2  = new THREE.Quaternion();
var _v3  = new THREE.Vector3();
var _euler = new THREE.Euler();

// ═══════════════════════════════════════════════════════════════════════════
// CAMERA CONTROLS (on canvas only)
// ═══════════════════════════════════════════════════════════════════════════
var cam = { theta:-0.42, phi:0.48, dist:22, panX:0, panY:0 };
function camApply(){
  var x=cam.dist*Math.sin(cam.phi)*Math.sin(cam.theta);
  var y=cam.dist*Math.cos(cam.phi);
  var z=cam.dist*Math.sin(cam.phi)*Math.cos(cam.theta);
  camera.position.set(x+cam.panX, y+cam.panY, z);
  camera.lookAt(cam.panX, cam.panY, 0);
}
camApply();

var drag={active:false,btn:0,sx:0,sy:0,ct:0,cp:0,cx:0,cy:0};
canvas.addEventListener('mousedown',function(e){
  drag.active=true; drag.btn=e.button;
  drag.sx=e.clientX; drag.sy=e.clientY;
  drag.ct=cam.theta; drag.cp=cam.phi; drag.cx=cam.panX; drag.cy=cam.panY;
});
window.addEventListener('mousemove',function(e){
  if(!drag.active) return;
  var dx=e.clientX-drag.sx, dy=e.clientY-drag.sy;
  if(drag.btn===0){
    cam.theta=drag.ct-dx*0.007;
    cam.phi=Math.max(0.05,Math.min(Math.PI*0.95,drag.cp-dy*0.007));
  } else if(drag.btn===2){
    cam.panX=drag.cx-dx*(cam.dist/600);
    cam.panY=drag.cy+dy*(cam.dist/600);
  }
  camApply();
});
window.addEventListener('mouseup',function(){ drag.active=false; });
canvas.addEventListener('wheel',function(e){
  cam.dist=Math.max(1.5,Math.min(100,cam.dist+e.deltaY*0.025)); camApply();
},{passive:true});
canvas.addEventListener('contextmenu',function(e){ e.preventDefault(); });

// Touch
var tc={}, tcStart={}, pinch0={d:0,cd:0}, td={active:false,sx:0,sy:0,ct:0,cp:0};
canvas.addEventListener('touchstart',function(e){
  if(e.target!==canvas) return; e.preventDefault();
  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i];
    tc[t.identifier]={x:t.clientX,y:t.clientY};
    tcStart[t.identifier]={x:t.clientX,y:t.clientY}; // save start for tap detection
  }
  var ids=Object.keys(tc);
  if(ids.length===1){
    td.active=true; td.sx=e.touches[0].clientX; td.sy=e.touches[0].clientY;
    td.ct=cam.theta; td.cp=cam.phi;
  } else if(ids.length===2){
    td.active=false;
    var t0=tc[ids[0]],t1=tc[ids[1]];
    pinch0.d=Math.hypot(t1.x-t0.x,t1.y-t0.y); pinch0.cd=cam.dist;
  }
},{passive:false});
canvas.addEventListener('touchmove',function(e){
  if(e.target!==canvas) return; e.preventDefault();
  for(var i=0;i<e.changedTouches.length;i++){
    var t=e.changedTouches[i]; if(tc[t.identifier]) tc[t.identifier]={x:t.clientX,y:t.clientY};
  }
  var ids=Object.keys(tc);
  if(ids.length===1&&td.active){
    var dx=e.touches[0].clientX-td.sx, dy=e.touches[0].clientY-td.sy;
    cam.theta=td.ct-dx*0.008;
    cam.phi=Math.max(0.05,Math.min(Math.PI*0.95,td.cp-dy*0.008));
    camApply();
  } else if(ids.length===2){
    var t0=tc[ids[0]],t1=tc[ids[1]];
    var d=Math.hypot(t1.x-t0.x,t1.y-t0.y);
    cam.dist=Math.max(1.5,Math.min(100,pinch0.cd*pinch0.d/d)); camApply();
  }
},{passive:false});
canvas.addEventListener('touchend',function(e){
  // Tap detection: single finger, moved less than 8px
  if(Object.keys(tc).length===1 && e.changedTouches.length===1){
    var t=e.changedTouches[0];
    var start=tcStart[t.identifier];
    if(start){
      var dx=t.clientX-start.x, dy=t.clientY-start.y;
      if(Math.hypot(dx,dy)<8) toggleUI();
    }
  }
  for(var i=0;i<e.changedTouches.length;i++){
    delete tc[e.changedTouches[i].identifier];
    delete tcStart[e.changedTouches[i].identifier];
  }
  if(Object.keys(tc).length===0) td.active=false;
},{passive:false});

// Mouse click on canvas also toggles UI
canvas.addEventListener('click', function(e){
  // Only toggle if it was a real click (not end of a drag)
  if(Math.abs(e.clientX - drag.sx) < 5 && Math.abs(e.clientY - drag.sy) < 5) toggleUI();
});

var uiVisible = true;
function toggleUI(){
  uiVisible = !uiVisible;
  var top = document.getElementById('top');
  var hud = document.getElementById('hud');
  var pt  = document.getElementById('panelToggle');
  if(uiVisible){
    top.classList.remove('ui-hidden');
    hud.classList.remove('ui-hidden');
    pt.classList.remove('ui-hidden');
  } else {
    top.classList.add('ui-hidden');
    hud.classList.add('ui-hidden');
    pt.classList.add('ui-hidden');
  }
}

// SIMULATION STATE

// We track elapsed days from J2000.0 (JD 2451545.0)
var J2000_JD = 2451545.0;
var state = {
  running: true,
  days: 0.0,      // days from J2000 (can be negative)
  spin: 0.0,      // Earth visual rotation angle (rad)
  moonSpin: 0.0,  // Moon visual rotation (tidally locked, = moonOrbitalAngle)
};

// UI toggles

var showGridFlag  = true;
var showAnnot     = true;
var showMoonOrbit = true;

});
document.getElementById('spd').addEventListener('input',function(){
  updateSpeedLabel(parseFloat(this.value));
});
function updateSpeedLabel(v) {
  var daysPerSec = Math.pow(10, v);
  var yrPerSec = daysPerSec / 365.24219;
  var label;
  if (yrPerSec < 1)       label = (daysPerSec).toFixed(1) + ' d/s';
  else if (yrPerSec < 10)  label = yrPerSec.toFixed(2) + ' yr/s';
  else if (yrPerSec < 1000) label = yrPerSec.toFixed(0) + ' yr/s';
  else                     label = (yrPerSec/1000).toFixed(1) + ' kyr/s';
  document.getElementById('spdV').textContent = label;
}
updateSpeedLabel(3); // init label for default value=3
document.getElementById('trailBtn').addEventListener('click',function(){
  showTrailFlag=!showTrailFlag; trailLine.visible=showTrailFlag;
  this.className=showTrailFlag?'on':'';
});
document.getElementById('gridBtn').addEventListener('click',function(){

  this.className=showGridFlag?'on':'';

document.getElementById('annotBtn').addEventListener('click',function(){

// ═══════════════════════════════════════════════════════════════════════════
// MAIN ANIMATION LOOP
// ═══════════════════════════════════════════════════════════════════════════
var lastT=null;

function animate(ts){
  requestAnimationFrame(animate);
  var dt=0;
  if(lastT!==null) dt=Math.min((ts-lastT)/1000, 0.1);
  lastT=ts;

  if(state.running && dt>0){
    // Speed slider is log10 scale: value v → 10^v days/sec
    // v=1 → 10 days/s (~0.027 yr/s)
    // v=2 → 100 days/s (~0.27 yr/s)
    // v=3 → 1000 days/s (~2.74 yr/s)  ← default
    // v=4 → 10000 days/s (~27.4 yr/s)
    // v=5 → 100000 days/s (~274 yr/s)
    // v=6 → 1000000 days/s (~2740 yr/s)
    // v=7 → 10000000 days/s (~27400 yr/s) — full prec cycle in ~1s
    var v = parseFloat(document.getElementById('spd').value);
    var daysPerSec = Math.pow(10, v);
    var dDays = daysPerSec * dt;
    state.days += dDays;
    // Earth sidereal spin: 1 sidereal day = 0.9972696 solar days
    state.spin += dDays * TWO_PI / 0.9972696;
    // Precession is NOT separately controlled — it is 100% derived from
    // state.days via IAU 2006 formula getPsiRad(T_yr). The ratio is
    // automatically exact: 1 orbit per tropical year, 1 prec cycle per 25771.6 yr.
  }

  // ── Derived quantities ────────────────────────────────────────────────
  var T_yr   = state.days / EARTH.Ty;         // tropical years from J2000
  var T_sid  = state.days / EARTH.Tsid;       // sidereal years
  var psiRad = getPsiRad(T_yr);
  var epsRad = getEpsRad(T_yr);

  // Earth mean anomaly (from perihelion)
  // Mean anomaly at J2000: M0 = L0 - varpi0 ≈ 357.5291° (from VSOP87)
  var M0_earth = 357.5291 * DEG;
  var earthE_meanAnom = M0_earth + (state.days / EARTH.Tsid) * TWO_PI;

  // Current eccentricity (secular drift negligible at human timescales but included)
  var e_earth = EARTH.e0 + EARTH.eDot * T_yr;
  e_earth = Math.max(0.0001, Math.min(0.2, e_earth));

  // Current perihelion longitude (apsidal precession)
  var varpi = EARTH.varpi0 + EARTH.varpiDot * state.days;

  // True anomaly
  var nu_earth = trueAnom(earthE_meanAnom, e_earth);

  // Heliocentric distance (AU)
  var r_AU = EARTH.a * (1 - e_earth*e_earth) / (1 + e_earth*Math.cos(nu_earth));
  var r_KM = r_AU * AU_KM;

  // Ecliptic longitude of Earth (from J2000 VE fixed direction +X)
  // ecliptic lon = nu + varpi (from fixed VE direction)
  // Precession: VE direction rotates, so inertial ecliptic lon of Earth = nu + varpi - psi
  var eclipLon_inertial = nu_earth + varpi - psiRad;

  // Scene position of Earth
  var r_sc = r_AU * AU_SC;
  var ex = r_sc * Math.cos(eclipLon_inertial);
  var ez = -r_sc * Math.sin(eclipLon_inertial);
  earthGroup.position.set(ex, 0, ez);

  // ── NCP direction (ecliptic frame) ────────────────────────────────────
  // NCP = (sin ε cos ψ, cos ε, −sin ε sin ψ)  [IAU 2006]
  var ncpX = Math.sin(epsRad)*Math.cos(psiRad);
  var ncpY = Math.cos(epsRad);
  var ncpZ = -Math.sin(epsRad)*Math.sin(psiRad);
  var ncpDir = new THREE.Vector3(ncpX,ncpY,ncpZ).normalize();

  // Orient entire earthGroup by TILT ONLY (no spin) — axis line & equator ring stay stable
  _q1.setFromUnitVectors(_up, ncpDir);
  earthGroup.quaternion.copy(_q1);

  // Apply daily spin ONLY to the globe mesh (first child), not the axis or rings
  _q2.setFromAxisAngle(_up, state.spin); // spin around local +Y (= ncpDir after group tilt)
  earthMesh.quaternion.copy(_q2);

  // Equatorial plane (world space) — tilt only, no spin
  eqPlane.position.copy(earthGroup.position);
  eqPlane.quaternion.copy(_q1);

  // ── Season markers + VE line (co-rotate with precessing VE) ──────────
  // VE direction: at J2000 along +X, retrograde by psiRad → angle = +psiRad on Y-axis
  seasonGroup.rotation.y = psiRad;
  // VE line (always points to current VE in ecliptic plane)
  var veX=Math.cos(psiRad)*AU_SC*1.73, veZ=Math.sin(psiRad)*AU_SC*1.73;
  veLine.geometry.setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(veX,0,veZ)]);
  veLine.geometry.computeBoundingSphere();

  // ── Sun-Earth line ────────────────────────────────────────────────────
  seLine.geometry.setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(ex,0,ez)]);
  seLine.geometry.computeBoundingSphere();

  // ── NCP on celestial sphere ───────────────────────────────────────────
  var ncpPos = ncpDir.clone().multiplyScalar(PREC_R);
  ncpMesh.position.copy(ncpPos);
  poleAxisLine.geometry.setFromPoints([new THREE.Vector3(0,0,0), ncpDir.clone().multiplyScalar(PREC_R*1.08)]);
  poleAxisLine.geometry.computeBoundingSphere();

  // Trail
  if(state.running && showTrailFlag){
    trailBuf[trailIdx%TRAIL_MAX].copy(ncpPos);
    trailIdx++; trailCount=Math.min(trailCount+1,TRAIL_MAX);
    var filled=[], st=trailIdx%TRAIL_MAX;
    for(var i=0;i<trailCount;i++) filled.push(trailBuf[(st+i)%TRAIL_MAX].clone());
    trailLine.geometry.dispose();
    trailLine.geometry=new THREE.BufferGeometry().setFromPoints(filled);
  }

  // ── MOON (ELP 2000-82 first-order) ───────────────────────────────────
  // Days from J2000
  var d = state.days;

  // Moon mean elements (Chapront/Meeus)
  // Mean longitude L (rad)
  var moonL = MOON.L0 + MOON.n * d;
  // Mean anomaly M (rad)
  var moonM = MOON.M0 + (TWO_PI / MOON.Tano) * d;
  // Ascending node Ω (retrograde)
  var moonOmega = MOON.Omega0 + MOON.nodeDot * d;
  // Argument of perigee ω (prograde)
  var moonOmegaSmall = MOON.omega0 + MOON.apseDot * d;
  // Mean argument of latitude F = L - Ω
  var moonF = moonL - moonOmega;

  // True anomaly of Moon
  var nu_moon = trueAnom(moonM, MOON.e0);
  // True distance (km)
  var moon_r_km = MOON.a * (1 - MOON.e0*MOON.e0) / (1 + MOON.e0*Math.cos(nu_moon));
  var moon_r_sc = (moon_r_km / MOON.a) * MOON_SC;

  // True longitude in Moon's orbital plane (argument of perigee + true anomaly)
  var uTrue = moonOmegaSmall + nu_moon;

  // Moon position in ecliptic coords (standard orbital mechanics transformation):
  // x_ecl = r*(cos Ω cos u − sin Ω sin u cos i)
  // y_ecl = r*(sin Ω cos u + cos Ω sin u cos i)
  // z_ecl = r*(sin u sin i)   ← out of ecliptic
  // But in our scene: ecliptic is XZ plane (y=0), so we map y_ecl → z_scene, z_ecl → y_scene
  var cosO = Math.cos(moonOmega), sinO = Math.sin(moonOmega);
  var cosU = Math.cos(uTrue),     sinU = Math.sin(uTrue);
  var cosI = Math.cos(MOON.i),    sinI = Math.sin(MOON.i);

  // In standard ecliptic (x,y heliocentric ecliptic; z = out of ecliptic):
  var mx_ecl = moon_r_sc * (cosO*cosU - sinO*sinU*cosI);
  var my_ecl = moon_r_sc * (sinO*cosU + cosO*sinU*cosI);
  var mz_ecl = moon_r_sc * (sinU * sinI);

  // Scene: ecliptic x→x, ecliptic y→-z (RH: +z into screen), ecliptic z→y
  var mx_sc = mx_ecl;
  var my_sc = mz_ecl;     // ecliptic "north" = scene y
  var mz_sc = -my_ecl;

  // Moon world position = Earth position + moon relative vector
  moonMesh.position.set(ex + mx_sc, my_sc, ez + mz_sc);

  // Moon orbit group: position at Earth, orientation from node & inclination
  moonOrbitGroup.position.set(ex, 0, ez);
  // Tilt orbit plane by inclination, rotate by node
  // Euler: rotate by node around ecliptic normal (Y), then by inclination around node line
  // In scene frame: node direction is along ecliptic (Y axis rotation), incl around that
  // We'll use quaternion: first rotate Y by (moonOmega), then tilt by i around local X
  var qNode = new THREE.Quaternion().setFromAxisAngle(_up, moonOmega);
  var nodeAxis = new THREE.Vector3(Math.cos(moonOmega), 0, -Math.sin(moonOmega));
  var qIncl = new THREE.Quaternion().setFromAxisAngle(nodeAxis, MOON.i);
  var qArgPeri = new THREE.Quaternion().setFromAxisAngle(_up, moonOmegaSmall - moonOmega);
  moonOrbitGroup.quaternion.copy(qNode).multiply(qIncl);

  // Earth-Moon line
  emLine.geometry.setFromPoints([earthGroup.position.clone(), moonMesh.position.clone()]);
  emLine.geometry.computeBoundingSphere();

  // ── Compute angular diameters ─────────────────────────────────────────
  var sunAngDiam_as = 2 * Math.atan2(SUN_RADIUS_KM, r_KM) / DEG * 3600; // arcsec
  var moonAngDiam_as = 2 * Math.atan2(MOON.R_mean, moon_r_km) / DEG * 3600;

  // Moon elongation from Sun (for phase)
  var moonElong_deg = ((moonL - (nu_earth + varpi)) / DEG % 360 + 360) % 360;
  var moonAge_days = moonElong_deg / 360 * MOON.Tsyn;

  // ── Ecliptic longitude of Sun as seen from Earth ──────────────────────
  // λ☉ = nu_earth + varpi (geocentric ecliptic longitude)
  var lambdaSun_deg = ((nu_earth + varpi) / DEG % 360 + 360) % 360;

  // Precession quantities
  var psiDeg = (psiRad/DEG % 360 + 360) % 360;
  var epsDeg = epsRad / DEG;
  var raShift = ((-psiDeg)%360+360)%360;
  var raH = Math.floor(raShift/15);
  var raM_val = Math.round((raShift/15-raH)*60); if(raM_val===60){raM_val=0;raH=(raH+1)%24;}

  var julYear = 2000 + T_yr;
  var jd = J2000_JD + state.days;

  // ── UPDATE HUD ────────────────────────────────────────────────────────
  document.getElementById('hYr').textContent  = (julYear>=0?'+':'')+julYear.toFixed(2);
  document.getElementById('hLon').textContent = lambdaSun_deg.toFixed(3)+'°';
  document.getElementById('hJD').textContent  = jd.toFixed(2);
  document.getElementById('hDays').textContent= state.days.toFixed(1)+' d';
  document.getElementById('hR').textContent   = r_AU.toFixed(6)+' AU';
  document.getElementById('hMR').textContent  = Math.round(moon_r_km).toLocaleString()+' km';
  document.getElementById('hNode').textContent= ((((moonOmega/DEG)%360)+360)%360).toFixed(2)+'°';
  document.getElementById('hApse').textContent= ((((moonOmegaSmall/DEG)%360)+360)%360).toFixed(2)+'°';
  document.getElementById('sBadge').textContent= getSeason(lambdaSun_deg);

  // ── UPDATE RIGHT PANEL ────────────────────────────────────────────────
  document.getElementById('epsNow').textContent  = epsDeg.toFixed(4)+'°';
  document.getElementById('psiNow').textContent  = psiDeg.toFixed(3)+'°';
  document.getElementById('veNow').textContent   = raH+'h '+(raM_val<10?'0':'')+raM_val+'m';
  document.getElementById('poleStar').textContent= nearestStar(T_yr);
  document.getElementById('esDist').textContent  = Math.round(r_KM).toLocaleString()+' km';
  document.getElementById('sunAngDiam').textContent = (sunAngDiam_as/3600).toFixed(4)+'° = '+sunAngDiam_as.toFixed(0)+'\"';
  document.getElementById('emDist').textContent  = Math.round(moon_r_km).toLocaleString()+' km';
  document.getElementById('moonAngDiam').textContent= (moonAngDiam_as/3600).toFixed(4)+'° = '+moonAngDiam_as.toFixed(0)+'\"';
  document.getElementById('moonPhase').textContent= moonPhase(moonElong_deg);
  document.getElementById('moonAge').textContent = moonAge_days.toFixed(2)+' d';

  renderer.render(scene, camera);
}

requestAnimationFrame(animate);
</script>
